name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv run --group dev ruff check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Check Python imports (no CUDA)
        run: |
          uv run python -c "
          import exllamav3_opt
          print('Package imports OK')
          "
        env:
          EXLLAMAV3_OPT_NOCOMPILE: "1"
