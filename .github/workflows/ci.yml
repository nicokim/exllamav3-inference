name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uvx ruff check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Check package structure
        run: |
          uv run --no-project python -c "
          import ast, pathlib
          for pkg in ['exllamav3_opt', 'exllamav3']:
              src = pathlib.Path('src') / pkg
              for f in sorted(src.rglob('*.py')):
                  ast.parse(f.read_text())
              print(f'  {pkg}: {len(list(src.rglob(chr(42)+\".py\")))} files, syntax OK')
          "
